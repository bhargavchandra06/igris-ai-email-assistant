spring.application.name=email-writer-sb

spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.4
spring.ai.google.genai.chat.options.max-output-tokens=2048

management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-origin-patterns=chrome-extension://*
app.rate-limit.enabled=true
app.rate-limit.requests-per-window=60
app.rate-limit.window=1m
