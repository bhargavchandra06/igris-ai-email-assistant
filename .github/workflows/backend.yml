name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "igiris-backend/**"

  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/igris-backend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/igris-backend:${SHA_TAG} \
            ./igiris-backend

      - name: Push Latest
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/igris-backend:latest

      - name: Push SHA Tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/igris-backend:${SHA_TAG}